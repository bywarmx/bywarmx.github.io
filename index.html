<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot de Mensajería Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            min-height: 120px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        #sendButton {
            background-color: #667eea;
            color: white;
        }
        
        #sendButton:hover {
            background-color: #5a6fd8;
            transform: translateY(-2px);
        }
        
        #clearButton {
            background-color: #f1f3f4;
            color: #444;
        }
        
        #clearButton:hover {
            background-color: #e4e6e8;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
        
        .telegram-icon {
            font-size: 24px;
            margin-bottom: 15px;
            color: #0088cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="telegram-icon">📱</div>
        <h1>Bot de Mensajería</h1>
        <p class="description">Envía mensajes a través de Telegram usando el bot configurado</p>
        
        <div class="form-group">
            <label for="message">Mensaje:</label>
            <textarea id="message" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>
        
        <div class="button-container">
            <button id="sendButton">Enviar Mensaje</button>
            <button id="clearButton">Limpiar</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="footer">
            <p>Este servicio utiliza la API de Telegram para enviar mensajes</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const botToken = '8157586356:AAGCyVhrGzUhdziV6b9AZsfLkBvqcuL70_k';
            const chatId = '394034313';
            
            // Función para mostrar estado
            function showStatus(message, type) {
                const status = $('#status');
                status.removeClass('success error info');
                status.addClass(type);
                status.text(message);
                status.fadeIn();
                
                setTimeout(function() {
                    status.fadeOut();
                }, 5000);
            }
            
            // Enviar mensaje
            $('#sendButton').click(function() {
                const message = $('#message').val().trim();
                
                if (!message) {
                    showStatus('Por favor, escribe un mensaje antes de enviar.', 'error');
                    return;
                }
                
                // Mostrar estado de envío
                showStatus('Enviando mensaje...', 'info');
                
                // Deshabilitar botón mientras se envía
                $('#sendButton').prop('disabled', true).text('Enviando...');
                
                // Enviar mensaje a través de la API de Telegram
                $.ajax({
                    url: `https://api.telegram.org/bot${botToken}/sendMessage`,
                    method: 'POST',
                    data: {
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    },
                    success: function(response) {
                        if (response.ok) {
                            showStatus('¡Mensaje enviado correctamente!', 'success');
                            $('#message').val('');
                        } else {
                            showStatus('Error al enviar el mensaje: ' + response.description, 'error');
                        }
                    },
                    error: function(xhr, status, error) {
                        showStatus('Error de conexión: ' + error, 'error');
                    },
                    complete: function() {
                        // Restaurar botón
                        $('#sendButton').prop('disabled', false).text('Enviar Mensaje');
                    }
                });
            });
            
            // Limpiar mensaje
            $('#clearButton').click(function() {
                $('#message').val('');
                showStatus('Campo de mensaje limpiado', 'info');
            });
            
            // Permitir enviar con Ctrl+Enter
            $('#message').keydown(function(e) {
                if (e.ctrlKey && e.keyCode === 13) {
                    $('#sendButton').click();
                }
            });
        });
    </script>
</body>
</html>
