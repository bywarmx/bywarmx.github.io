<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Bywarrior™</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="files/images/vngicon.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f7fafc 0%, #e3e6f3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', Verdana, Arial, sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(44, 62, 80, 0.12);
      padding: 56px 38px 38px 38px;
      max-width: 390px;
      width: 100%;
      text-align: center;
      position: relative;
      animation: fadeIn 0.9s cubic-bezier(.22,.68,.62,1.11);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(32px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      margin-bottom: 22px;
      box-shadow: 0 2px 12px rgba(44, 62, 80, 0.07);
      background: #f7fafc;
      object-fit: cover;
    }
    .title {
      font-size: 2.4rem;
      font-weight: 700;
      color: #364F6B;
      margin-bottom: 12px;
      letter-spacing: 1.5px;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #3f72af;
      margin-bottom: 24px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .desc {
      font-size: 1rem;
      color: #22223b;
      margin-bottom: 14px;
      font-weight: 400;
      line-height: 1.6;
    }
    footer {
      font-size: 0.9rem;
      color: #b3b3b3;
      margin-top: 28px;
      letter-spacing: 0.8px;
    }
    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 32px 12px;
        max-width: 98vw;
      }
      .title {
        font-size: 2rem;
      }
      .logo {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="files/images/vngicon.png" alt="Logo Bywarrior">
    <div class="title">Bywarrior™</div>
    <div class="subtitle">Bienvenido</div>
    <div class="desc">
      Este sitio es un alojamiento de códigos personales, proyectos y recursos de interés.
    </div>
    <footer>
      © 2025 | Sitio generado con GitHub Pages
    </footer>
  </div>
  <script>
    // Deshabilitar menú contextual (clic derecho)
    document.addEventListener("contextmenu", function(e){
      e.preventDefault();
    });
  </script>
</body>
</html>
