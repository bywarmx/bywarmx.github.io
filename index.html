<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Bywarrior™</title>
  <link rel="shortcut icon" href="files/images/vngicon.png" type="image/x-icon" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f6f8fa;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .welcome-box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(36,41,46,0.07);
      padding: 45px 55px;
      text-align: center;
      max-width: 420px;
    }
    .logo {
      margin-bottom: 20px;
    }
    .title {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 48pt;
      color: #222;
      font-weight: bold;
      margin: 0 0 12px 0;
    }
    .subtitle {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 20pt;
      color: #555;
      margin-bottom: 24px;
    }
    .desc {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 16pt;
      color: #333;
      margin-bottom: 8px;
    }
    footer {
      font-size: 12pt;
      color: #888;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="welcome-box">
    <img class="logo" src="files/images/vngicon.png" alt="Logo" width="64" height="64">
    <div class="title">Bywarrior™</div>
    <div class="subtitle">Bienvenido</div>
    <div class="desc">Este sitio es un alojamiento de códigos personales, proyectos y recursos de interés.</div>
    <footer>© 2025 | Sitio generado con GitHub Pages</footer>
  </div>
  <script>
    // Deshabilitar menú contextual (clic derecho)
    document.addEventListener("contextmenu", function(e){
      e.preventDefault();
    });
  </script>
</body>
</html>
