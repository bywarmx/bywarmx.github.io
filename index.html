<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Bywarrior™</title>
  <link rel="shortcut icon" href="files/images/vngicon.png" type="image/x-icon" />
  <style>
    :root {
      --primary: #22223B;
      --accent: #4A4E69;
      --background: #F2E9E4;
      --white: #fff;
      --shadow: 0 4px 16px rgba(34,34,59,0.08);
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--background);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .welcome-box {
      background: var(--white);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 48px 38px;
      text-align: center;
      max-width: 430px;
      min-width: 320px;
      border: 1px solid #e0e0e0;
    }
    .logo {
      margin-bottom: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(34,34,59,0.07);
    }
    .title {
      font-family: 'Segoe UI', Verdana, Arial, sans-serif;
      font-size: 46px;
      color: var(--primary);
      font-weight: bold;
      letter-spacing: 2px;
      margin: 0 0 12px 0;
    }
    .subtitle {
      font-family: 'Segoe UI', Verdana, Arial, sans-serif;
      font-size: 22px;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .desc {
      font-family: 'Segoe UI', Verdana, Arial, sans-serif;
      font-size: 18px;
      color: #444;
      margin-bottom: 18px;
    }
    footer {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <div class="welcome-box">
    <img class="logo" src="files/images/vngicon.png" alt="Logo Bywarrior" width="70" height="70">
    <div class="title">Bywarrior™</div>
    <div class="subtitle">Bienvenido</div>
    <div class="desc">Este sitio es un alojamiento de códigos personales, proyectos y recursos de interés.</div>
    <footer>© 2025 | Sitio generado con GitHub Pages</footer>
  </div>
  <script>
    // Deshabilitar menú contextual (clic derecho)
    document.addEventListener("contextmenu", function(e){
      e.preventDefault();
    });
  </script>
</body>
</html>
